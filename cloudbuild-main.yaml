steps:
  - name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    id: Prepare Maven Auth
    entrypoint: bash
    args:
      - -ceu
      - |
        TOKEN="$(gcloud auth print-access-token)"
        cat > /workspace/settings.xml <<EOF
        <settings>
          <servers>
            <server>
              <id>artifact-registry</id>
              <username>oauth2accesstoken</username>
              <password>$${TOKEN}</password>
            </server>
            <server>
              <id>fwmtg-maven-release</id>
              <username>oauth2accesstoken</username>
              <password>$${TOKEN}</password>
            </server>
            <server>
              <id>fwmtg-maven-snapshot</id>
              <username>oauth2accesstoken</username>
              <password>$${TOKEN}</password>
            </server>
          </servers>
          <profiles>
            <profile>
              <id>artifact-registry</id>
              <repositories>
                <repository>
                  <id>central</id>
                  <url>https://repo.maven.apache.org/maven2</url>
                  <releases>
                    <enabled>true</enabled>
                  </releases>
                  <snapshots>
                    <enabled>false</enabled>
                  </snapshots>
                </repository>
                <repository>
                  <id>fwmtg-maven-release</id>
                  <url>https://${_REGION}-maven.pkg.dev/${PROJECT_ID}/fwmtg-maven-release</url>
                  <releases>
                    <enabled>true</enabled>
                  </releases>
                  <snapshots>
                    <enabled>false</enabled>
                  </snapshots>
                </repository>
                <repository>
                  <id>fwmtg-maven-snapshot</id>
                  <url>https://${_REGION}-maven.pkg.dev/${PROJECT_ID}/fwmtg-maven-snapshot</url>
                  <releases>
                    <enabled>false</enabled>
                  </releases>
                  <snapshots>
                    <enabled>true</enabled>
                  </snapshots>
                </repository>
              </repositories>
              <pluginRepositories>
                <pluginRepository>
                  <id>central</id>
                  <url>https://repo.maven.apache.org/maven2</url>
                  <releases>
                    <enabled>true</enabled>
                  </releases>
                  <snapshots>
                    <enabled>false</enabled>
                  </snapshots>
                </pluginRepository>
              </pluginRepositories>
            </profile>
          </profiles>
          <activeProfiles>
            <activeProfile>artifact-registry</activeProfile>
          </activeProfiles>
        </settings>
        EOF

  - name: maven:3.9.16-eclipse-temurin-25
    id: Compute Main RC Version
    entrypoint: bash
    env:
      - BUILD_ID=$BUILD_ID
    args:
      - -ceu
      - |
        if [[ ! -f version.txt ]]; then
          echo "ERROR: version.txt not found" >&2
          exit 1
        fi

        BASE_VERSION="$(tr -d '\r\n' < version.txt)"
        if [[ -z "$${BASE_VERSION}" ]]; then
          echo "ERROR: version.txt is empty" >&2
          exit 1
        fi

        BASE_VERSION="$(echo "$${BASE_VERSION}" | sed -E 's/-SNAPSHOT$//; s/-rc\.[0-9]+$//')"

        RC_NUMBER="$(echo "$${BUILD_ID:-1}" | tr -cd '0-9' | cut -c1-6)"
        if [[ -z "$${RC_NUMBER}" ]]; then
          RC_NUMBER="1"
        fi

        EFFECTIVE_VERSION="$${BASE_VERSION}-rc.$${RC_NUMBER}"
        echo "$${EFFECTIVE_VERSION}" > /workspace/effective-version.txt

  - name: maven:3.9.16-eclipse-temurin-25
    id: Test
    entrypoint: bash
    args:
      - -ceu
      - |
        EFFECTIVE_VERSION="$(cat /workspace/effective-version.txt)"
        mvn -B -ntp -s /workspace/settings.xml -Drevision="$${EFFECTIVE_VERSION}" clean verify

  - name: maven:3.9.16-eclipse-temurin-25
    id: Publish Release Candidate
    entrypoint: bash
    args:
      - -ceu
      - |
        EFFECTIVE_VERSION="$(cat /workspace/effective-version.txt)"
        mvn -B -ntp -s /workspace/settings.xml deploy -DskipTests \
          -Drevision="$${EFFECTIVE_VERSION}" \
          -DaltDeploymentRepository=artifact-registry::default::https://${_REGION}-maven.pkg.dev/${PROJECT_ID}/${_REPO_SUFFIX}

  - name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    id: Log Published Coordinates
    entrypoint: bash
    args:
      - -ceu
      - |
        VERSION="$(cat /workspace/effective-version.txt)"
        echo "Published : uk.gov.ons.census.fwmt:census31-fwmt-tm-mock:$${VERSION}"
        echo "Repository: ${_REPO_SUFFIX}"

  - name: gcr.io/cloud-builders/docker
    id: Build Docker Main Image
    entrypoint: bash
    args:
      - -ceu
      - |
        docker build --pull \
          --build-arg jar=$(ls target/*.jar | grep -v original | head -1) \
          -t "${_DOCKER_REGION}-docker.pkg.dev/${PROJECT_ID}/${_DOCKER_REPO}/${_IMAGE}:${SHORT_SHA}" \
          .

  - name: gcr.io/cloud-builders/docker
    id: Push Docker Main Image
    entrypoint: bash
    args:
      - -ceu
      - |
        docker push "${_DOCKER_REGION}-docker.pkg.dev/${PROJECT_ID}/${_DOCKER_REPO}/${_IMAGE}:${SHORT_SHA}"

images:
  - "${_DOCKER_REGION}-docker.pkg.dev/${PROJECT_ID}/${_DOCKER_REPO}/${_IMAGE}:${SHORT_SHA}"

substitutions:
  _DOCKER_REGION: europe-west2
  _DOCKER_REPO: fwmtg-docker-ci
  _IMAGE: census31-fwmt-tm-mock
  _REPO_SUFFIX: fwmtg-maven-release
  _REGION: europe-west2

options:
  logging: CLOUD_LOGGING_ONLY
